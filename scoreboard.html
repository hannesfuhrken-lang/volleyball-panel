
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Volleyball Broadcast Scoreboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
authDomain: "volleyballscoreboard-52f22.firebaseapp.com",
databaseURL: "https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
projectId: "volleyballscoreboard-52f22",
storageBucket: "volleyballscoreboard-52f22.firebasestorage.app",
messagingSenderId: "826519449030",
appId: "1:826519449030:web:110111c4e1fa1f8fa796c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastA = 0;
let lastB = 0;

onValue(ref(db), (snapshot)=>{

const d = snapshot.val();
if(!d) return;

document.getElementById("teamA").innerText = d.teamA;
document.getElementById("teamB").innerText = d.teamB;

document.getElementById("pointsA").innerText = d.pointsA;
document.getElementById("pointsB").innerText = d.pointsB;

document.getElementById("setsA").innerText = d.setsA;
document.getElementById("setsB").innerText = d.setsB;

document.getElementById("timer").innerText = d.timer;

if(d.pointsA > lastA) flash("pointsA");
if(d.pointsB > lastB) flash("pointsB");

lastA = d.pointsA;
lastB = d.pointsB;

});

function flash(id){

const el = document.getElementById(id);

el.classList.add("scoreAnim");

setTimeout(()=>{
el.classList.remove("scoreAnim");
},500);

}

</script>

<style>

body{
margin:0;
background:transparent;
font-family:Arial,Helvetica,sans-serif;
}

.overlay{

position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;

background:#0c0f14;

border-radius:12px;
overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.7);

}

.team{

display:flex;
align-items:center;
padding:18px 30px;

font-size:28px;
font-weight:bold;
color:white;

min-width:260px;

}

.teamA{
background:linear-gradient(90deg,#0f4d2c,#1f7a3d);
}

.teamB{
background:linear-gradient(90deg,#1b3f7a,#2155a3);
}

.scoreBox{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:#141922;

padding:12px 25px;
color:white;

}

.sets{
font-size:16px;
opacity:0.8;
}

.points{

font-size:48px;
font-weight:bold;
}

.timer{

background:#111722;

color:white;

font-size:24px;
padding:12px 25px;

display:flex;
align-items:center;

}

.scoreAnim{

transform:scale(1.3);
text-shadow:0 0 12px white;
transition:0.2s;

}

</style>
</head>

<body>

</div>

</div>

</body>
</html>
