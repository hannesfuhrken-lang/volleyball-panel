<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Volleyball Broadcast Scoreboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
authDomain: "volleyballscoreboard-52f22.firebaseapp.com",
databaseURL: "https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
projectId: "volleyballscoreboard-52f22",
storageBucket: "volleyballscoreboard-52f22.firebasestorage.app",
messagingSenderId: "826519449030",
appId: "1:826519449030:web:110111c4e1fa1f8fa796c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastA = 0;
let lastB = 0;

onValue(ref(db),(snap)=>{

const d = snap.val();
if(!d) return;

document.getElementById("teamA").innerText = d.teamA;
document.getElementById("teamB").innerText = d.teamB;

document.getElementById("pointsA").innerText = d.pointsA;
document.getElementById("pointsB").innerText = d.pointsB;

document.getElementById("timer").innerText = d.timer;

/* SET BOXES */

updateSets("setsAboxes", d.setsA);
updateSets("setsBboxes", d.setsB);

/* POINT ANIMATION */

if(d.pointsA > lastA) flash("pointsA");
if(d.pointsB > lastB) flash("pointsB");

lastA = d.pointsA;
lastB = d.pointsB;

});

function updateSets(id,sets){

const boxes = document.querySelectorAll(`#${id} .setBox`);

boxes.forEach((box,index)=>{
box.classList.remove("active");
if(index < sets) box.classList.add("active");
});

}

function flash(id){

const el = document.getElementById(id);

el.classList.add("scoreFlash");

setTimeout(()=>{
el.classList.remove("scoreFlash");
},350);

}

</script>

<style>

body{
margin:0;
background:transparent;
font-family:Arial,Helvetica,sans-serif;
}

/* POSITION */

.scoreboard{

position:absolute;

top:30px;
left:30px;

display:flex;
align-items:center;

background:#0e1117;

border-radius:12px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.8);

}

/* TEAM NAMES */

.team{

padding:16px 26px;

font-size:22px;
font-weight:bold;

color:white;

min-width:160px;

}

.teamA{
background:linear-gradient(90deg,#0f4d2c,#1f7a3d);
}

.teamB{
background:linear-gradient(90deg,#1b3f7a,#2155a3);
}

/* SCORE AREA */

.score{

display:flex;
flex-direction:column;

align-items:center;

background:#151a22;

padding:10px 18px;

color:white;

}

/* SET BOXES */

.setBoxes{
display:flex;
gap:4px;
margin-bottom:4px;
}

.setBox{

width:12px;
height:12px;

background:#2a2f3a;

border-radius:2px;

}

.setBox.active{
background:#ffffff;
}

/* POINTS */

.points{

font-size:42px;
font-weight:bold;

transition:0.2s;

}

/* TIMER */

.timer{

background:#10151d;

padding:12px 18px;

font-size:20px;

color:white;

}

/* POINT ANIMATION */

.scoreFlash{

transform:scale(1.25);

text-shadow:0 0 12px white;

}

</style>

</head>

<body>

<div class="scoreboard">

<div class="team teamA" id="teamA">
FINDORFF
</div>

<div class="score">

<div class="setBoxes" id="setsAboxes">
<div class="setBox"></div>
<div class="setBox"></div>
<div class="setBox"></div>
</div>

<div class="points" id="pointsA">0</div>

</div>

<div class="timer" id="timer">
00:00
</div>

<div class="score">

<div class="setBoxes" id="setsBboxes">
<div class="setBox"></div>
<div class="setBox"></div>
<div class="setBox"></div>
</div>

<div class="points" id="pointsB">0</div>

</div>

<div class="team teamB" id="teamB">
GAST
</div>

</div>

</body>
</html>
