<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SG Findorff Scoreboard</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
  authDomain: "volleyballscoreboard-52f22.firebaseapp.com",
  databaseURL: "https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
  projectId: "volleyballscoreboard-52f22",
  storageBucket: "volleyballscoreboard-52f22.firebasestorage.app",
  messagingSenderId: "826519449030",
  appId: "1:826519449030:web:110111c4e1fa1f8fa796c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastPointsA = 0;
let lastPointsB = 0;

onValue(ref(db), (snapshot)=>{
  const d = snapshot.val();
  if(!d) return;

  document.getElementById("teamA").innerText = d.teamA;
  document.getElementById("teamB").innerText = d.teamB;

  document.getElementById("setsA").innerText = d.setsA;
  document.getElementById("setsB").innerText = d.setsB;

  document.getElementById("pointsA").innerText = d.pointsA;
  document.getElementById("pointsB").innerText = d.pointsB;

  document.getElementById("timer").innerText = d.timer;

  if(d.pointsA > lastPointsA) animate("pointsA");
  if(d.pointsB > lastPointsB) animate("pointsB");

  lastPointsA = d.pointsA;
  lastPointsB = d.pointsB;
});

function animate(id){
  const el = document.getElementById(id);
  el.classList.add("scoreFlash");
  setTimeout(()=>el.classList.remove("scoreFlash"),600);
}
</script>

<style>

body{
margin:0;
background:transparent;
font-family:Arial;
}

.scoreboard{
width:900px;
margin:40px auto;
}

.row{
display:flex;
height:80px;
margin-bottom:15px;
}

.team{
flex:5;
font-size:34px;
font-weight:bold;
padding-left:25px;
display:flex;
align-items:center;
color:white;
}

.teamA{
background:linear-gradient(90deg,#0f4d2c,#1f7a3d);
}

.teamB{
background:linear-gradient(90deg,#1b3f7a,#2155a3);
}

.set{
width:70px;
background:#e6e6e6;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.points{
width:130px;
font-size:46px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
color:white;
transition:0.3s;
}

.pointsA{
background:#1f7a3d;
}

.pointsB{
background:#2155a3;
}

.timer{
width:300px;
margin:25px auto;
background:#0d1f26;
color:white;
font-size:38px;
text-align:center;
padding:12px;
border-radius:8px;
}

/* Animation */

.scoreFlash{
transform:scale(1.25);
box-shadow:0 0 25px #fff;
}

</style>
</head>

<body>

<div class="scoreboard">

<div class="row">
<div class="team teamA" id="teamA">FINDORFF</div>
<div class="set" id="setsA">0</div>
<div class="points pointsA" id="pointsA">0</div>
</div>

<div class="row">
<div class="team teamB" id="teamB">GAST</div>
<div class="set" id="setsB">0</div>
<div class="points pointsB" id="pointsB">0</div>
</div>

<div class="timer" id="timer">00:00</div>

</div>

</body>
</html>
