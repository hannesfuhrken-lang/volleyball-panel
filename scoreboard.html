<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SG Findorff Scoreboard</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ------------------- FIREBASE -------------------
const firebaseConfig = {
  apiKey: "AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
  authDomain: "volleyballscoreboard-52f22.firebaseapp.com",
  databaseURL: "https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
  projectId: "volleyballscoreboard-52f22",
  storageBucket: "volleyballscoreboard-52f22.firebasestorage.app",
  messagingSenderId: "826519449030",
  appId: "1:826519449030:web:110111c4e1fa1f8fa796c7",
  measurementId: "G-3GHBDBFFCL"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase(app);

let lastPointsA = 0;
let lastPointsB = 0;

onValue(ref(db), (snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  document.getElementById("teamA").innerText = data.teamA;
  document.getElementById("teamB").innerText = data.teamB;

  document.getElementById("setsA").innerText = data.setsA;
  document.getElementById("setsB").innerText = data.setsB;

  document.getElementById("pointsA").innerText = data.pointsA;
  document.getElementById("pointsB").innerText = data.pointsB;

  document.getElementById("timer").innerText = data.timer;

  if(data.pointsA > lastPointsA) glow("pointsA", "#1f7a3d");
  if(data.pointsB > lastPointsB) glow("pointsB", "#2155a3");

  lastPointsA = data.pointsA;
  lastPointsB = data.pointsB;
});

function glow(id, color){
  const el = document.getElementById(id);
  el.style.boxShadow = `0 0 25px ${color}`;
  setTimeout(()=> el.style.boxShadow="", 600);
}
</script>

<style>
body{margin:0; background:transparent; font-family:Arial, Helvetica, sans-serif;}
.scoreboard{width:900px; margin:40px auto;}
.row{display:flex; align-items:center; margin-bottom:15px; height:80px;}
.team{flex:5; font-size:32px; font-weight:bold; padding-left:25px; color:white; display:flex; align-items:center;}
.teamA{background:linear-gradient(90deg,#0f4d2c,#1f7a3d);}
.teamB{background:linear-gradient(90deg,#1b3f7a,#2155a3);}
.set{width:70px; background:#e6e6e6; text-align:center; font-size:30px; font-weight:bold;}
.points{width:130px; text-align:center; font-size:42px; font-weight:bold; color:white;}
.pointsA{background:#1f7a3d;}
.pointsB{background:#2155a3;}
.timer{width:300px; margin:25px auto 0; background:#0d1f26; color:white; font-size:38px; text-align:center; padding:12px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.5);}
</style>
</head>

<body>
<div class="scoreboard">
  <div class="row">
    <div class="team teamA" id="teamA">FINDORFF</div>
    <div class="set" id="setsA">0</div>
    <div class="points pointsA" id="pointsA">0</div>
  </div>
  <div class="row">
    <div class="team teamB" id="teamB">GAST</div>
    <div class="set" id="setsB">0</div>
    <div class="points pointsB" id="pointsB">0</div>
  </div>
  <div class="timer" id="timer">00:00</div>
</div>
</body>
</html>
