
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
authDomain:"volleyballscoreboard-52f22.firebaseapp.com",
databaseURL:"https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
projectId:"volleyballscoreboard-52f22",
storageBucket:"volleyballscoreboard-52f22.firebasestorage.app",
messagingSenderId:"826519449030",
appId:"1:826519449030:web:110111c4e1fa1f8fa796c7"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db),(snap)=>{

const d=snap.val();
if(!d)return;

document.getElementById("teamA").innerText=d.teamA;
document.getElementById("teamB").innerText=d.teamB;

document.getElementById("pointsA").innerText=d.pointsA;
document.getElementById("pointsB").innerText=d.pointsB;

document.getElementById("setsA").innerText=d.setsA;
document.getElementById("setsB").innerText=d.setsB;

document.getElementById("timer").innerText=d.timer;

});

async function readData(){
const snap=await get(ref(db));
return snap.val();
}

/* ------------------ PUNKTE ------------------ */

window.addPoint=async function(team){

const d = await readData();

let pointsA = d.pointsA;
let pointsB = d.pointsB;

if(team==="A") pointsA++;
else pointsB++;

let setsA = d.setsA;
let setsB = d.setsB;

/* VOLLEYBALL SATZ REGEL */

if(pointsA >= 25 && pointsA - pointsB >= 2){

setsA++;
pointsA = 0;
pointsB = 0;

}

if(pointsB >= 25 && pointsB - pointsA >= 2){

setsB++;
pointsA = 0;
pointsB = 0;

}

update(ref(db),{
pointsA:pointsA,
pointsB:pointsB,
setsA:setsA,
setsB:setsB
});

}

/* ------------------ PUNKTE ENTFERNEN ------------------ */

window.removePoint=async function(team){

const d=await readData();

if(team==="A" && d.pointsA>0) update(ref(db),{pointsA:d.pointsA-1});
if(team==="B" && d.pointsB>0) update(ref(db),{pointsB:d.pointsB-1});

}

/* ------------------ SÄTZE ------------------ */

window.addSet=async function(team){

const d=await readData();

if(team==="A") update(ref(db),{setsA:d.setsA+1,pointsA:0,pointsB:0});
else update(ref(db),{setsB:d.setsB+1,pointsA:0,pointsB:0});

}

/* ------------------ TEAMNAMEN ------------------ */

window.updateTeams=function(){

const teamA=document.getElementById("teamAInput").value;
const teamB=document.getElementById("teamBInput").value;

update(ref(db),{
teamA:teamA,
teamB:teamB
});

}

/* ------------------ TIMER ------------------ */

let timerInterval;
let seconds=0;

window.startTimer=function(){

if(timerInterval) return;

timerInterval=setInterval(()=>{
seconds++;
updateTimer();
},1000);

}

window.stopTimer=function(){

clearInterval(timerInterval);
timerInterval=null;

}

window.resetTimer=function(){

seconds=0;
updateTimer();

}

function updateTimer(){

const min=String(Math.floor(seconds/60)).padStart(2,"0");
const sec=String(seconds%60).padStart(2,"0");

update(ref(db),{timer:`${min}:${sec}`});

}

/* ------------------ RESET ------------------ */

window.fullReset=function(){

if(confirm("Alles zurücksetzen?")){

set(ref(db),{
teamA:"FINDORFF",
teamB:"GAST",
pointsA:0,
pointsB:0,
setsA:0,
setsB:0,
timer:"00:00"
});

seconds=0;

}

}

</script>
