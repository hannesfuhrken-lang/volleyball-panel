<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SG Findorff Panel</title>

<style>

body{
margin:0;
background:#0f1115;
font-family:Segoe UI,Arial;
color:white;
}

.panel{
max-width:420px;
margin:30px auto;
padding:25px;
background:#161a21;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

h1{
text-align:center;
margin-bottom:20px;
}

.section{
margin-top:20px;
}

/* BUTTONS */

button{
width:48%;
padding:16px;
margin:6px 1%;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.green{background:#1f7a3d;color:white;}
.blue{background:#2155a3;color:white;}
.gray{background:#3a3f47;color:white;}
.red{background:#b42323;color:white;width:100%;}

/* INPUT */

input{
width:100%;
padding:12px;
margin-bottom:8px;
border:none;
border-radius:6px;
background:#222833;
color:white;
font-size:16px;
}

/* SCORE DISPLAY */

.scoreDisplay{
display:flex;
justify-content:space-between;
background:#0c0f14;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.teamBox{
text-align:center;
width:40%;
}

.points{
font-size:42px;
font-weight:bold;
}

.timer{
font-size:24px;
font-weight:bold;
}

/* ============================= */
/* MOBILE VERSION */
/* ============================= */

@media (max-width:600px){

.panel{
margin:10px;
padding:20px;
}

h1{
font-size:28px;
}

button{
width:100%;
font-size:22px;
padding:22px;
margin:10px 0;
}

.green,.blue{
font-size:24px;
}

.points{
font-size:56px;
}

.timer{
font-size:28px;
}

.scoreDisplay{
padding:20px;
}

}

</style>
</head>

<body>

<div class="panel">

<h1>SG Findorff Panel</h1>

<div class="scoreDisplay">

<div class="teamBox">
<div id="teamA">FINDORFF</div>
<div class="points" id="pointsA">0</div>
<div>Sätze <span id="setsA">0</span></div>
</div>

<div class="timer" id="timer">00:00</div>

<div class="teamBox">
<div id="teamB">GAST</div>
<div class="points" id="pointsB">0</div>
<div>Sätze <span id="setsB">0</span></div>
</div>

</div>

<div class="section">
<input id="teamAInput" placeholder="Team A Name">
<input id="teamBInput" placeholder="Team B Name">
<button class="gray" style="width:100%" onclick="updateTeams()">Teams aktualisieren</button>
</div>

<div class="section">
<button class="green" onclick="addPoint('A')">+ Punkt A</button>
<button class="blue" onclick="addPoint('B')">+ Punkt B</button>
<button class="green" onclick="removePoint('A')">− Punkt A</button>
<button class="blue" onclick="removePoint('B')">− Punkt B</button>
</div>

<div class="section">
<button class="green" onclick="addSet('A')">+ Satz A</button>
<button class="blue" onclick="addSet('B')">+ Satz B</button>
</div>

<div class="section">
<button class="gray" onclick="startTimer()">Start</button>
<button class="gray" onclick="stopTimer()">Stop</button>
<button class="gray" style="width:100%" onclick="resetTimer()">Reset</button>
</div>

<button class="red" onclick="fullReset()">Komplett Reset</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDd9E5P9vR_Buwgh_shM0p-msjdwq3I7XU",
authDomain:"volleyballscoreboard-52f22.firebaseapp.com",
databaseURL:"https://volleyballscoreboard-52f22-default-rtdb.firebaseio.com",
projectId:"volleyballscoreboard-52f22",
storageBucket:"volleyballscoreboard-52f22.firebasestorage.app",
messagingSenderId:"826519449030",
appId:"1:826519449030:web:110111c4e1fa1f8fa796c7"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db),(snap)=>{

const d=snap.val();
if(!d)return;

document.getElementById("teamA").innerText=d.teamA;
document.getElementById("teamB").innerText=d.teamB;

document.getElementById("pointsA").innerText=d.pointsA;
document.getElementById("pointsB").innerText=d.pointsB;

document.getElementById("setsA").innerText=d.setsA;
document.getElementById("setsB").innerText=d.setsB;

document.getElementById("timer").innerText=d.timer;

});

async function readData(){
const snap=await get(ref(db));
return snap.val();
}

window.addPoint=async function(team){

const d = await readData();

let pointsA = d.pointsA;
let pointsB = d.pointsB;

if(team==="A") pointsA++;
else pointsB++;

let setsA = d.setsA;
let setsB = d.setsB;

if(pointsA >= 25 && pointsA - pointsB >= 2){
setsA++;
pointsA = 0;
pointsB = 0;
}

if(pointsB >= 25 && pointsB - pointsA >= 2){
setsB++;
pointsA = 0;
pointsB = 0;
}

update(ref(db),{
pointsA:pointsA,
pointsB:pointsB,
setsA:setsA,
setsB:setsB
});

}

window.removePoint=async function(team){

const d=await readData();

if(team==="A" && d.pointsA>0) update(ref(db),{pointsA:d.pointsA-1});
if(team==="B" && d.pointsB>0) update(ref(db),{pointsB:d.pointsB-1});

}

window.addSet=async function(team){

const d=await readData();

if(team==="A") update(ref(db),{setsA:d.setsA+1,pointsA:0,pointsB:0});
else update(ref(db),{setsB:d.setsB+1,pointsA:0,pointsB:0});

}

window.updateTeams=function(){

const teamA=document.getElementById("teamAInput").value;
const teamB=document.getElementById("teamBInput").value;

update(ref(db),{
teamA:teamA,
teamB:teamB
});

}

let timerInterval;
let seconds=0;

window.startTimer=function(){

if(timerInterval) return;

timerInterval=setInterval(()=>{
seconds++;
updateTimer();
},1000);

}

window.stopTimer=function(){
clearInterval(timerInterval);
timerInterval=null;
}

window.resetTimer=function(){
seconds=0;
updateTimer();
}

function updateTimer(){

const min=String(Math.floor(seconds/60)).padStart(2,"0");
const sec=String(seconds%60).padStart(2,"0");

update(ref(db),{timer:`${min}:${sec}`});

}

window.fullReset=function(){

if(confirm("Alles zurücksetzen?")){

set(ref(db),{
teamA:"FINDORFF",
teamB:"GAST",
pointsA:0,
pointsB:0,
setsA:0,
setsB:0,
timer:"00:00"
});

seconds=0;

}

}

</script>

</body>
</html>
